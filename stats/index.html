<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lydia Hansen | Creator Analytics</title>
  <meta name="description" content="Real-time TikTok performance analytics for creator Lydia Hansen — audience size, engagement, demographics, and reach." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --cream:       #f7f3ee;
      --cream-mid:   #f1ddd2;
      --blush:       #e8c4b0;
      --terracotta:  #d7a98f;
      --bark:        #b07a5e;
      --ink:         #1f1f1f;
      --ink-soft:    #5a4a42;
      --ink-faint:   #8a7568;
      --white:       #ffffff;
      --line:        #ece1d6;
      --hover:       #faf6f1;
      --positive:    #2d8a50;
      --negative:    #c14545;
      --shadow-sm:   0 2px 8px rgba(176,122,94,0.06);
      --shadow-md:   0 8px 32px rgba(176,122,94,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      font-feature-settings: "ss01", "tnum";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      position: relative;
      z-index: 1;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-soft);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--bark); }
    .back-link::before { content: '←'; font-size: 15px; }

    .last-updated {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }
    .last-updated .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--positive);
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2.4s ease infinite;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .header-photo {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--cream-mid);
      flex-shrink: 0;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.015em;
      margin-bottom: 4px;
    }

    .header .handle {
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── Range selector ── */
    .range-selector {
      display: flex;
      gap: 4px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      box-shadow: var(--shadow-sm);
    }
    .range-selector::-webkit-scrollbar { display: none; }

    .range-btn {
      flex: 1;
      min-width: max-content;
      background: transparent;
      border: none;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--ink-soft);
      cursor: pointer;
      border-radius: 999px;
      transition: background 0.18s, color 0.18s;
      font-family: inherit;
      white-space: nowrap;
    }
    .range-btn:hover { color: var(--ink); background: var(--hover); }
    .range-btn.active {
      background: var(--ink);
      color: var(--white);
    }

    /* ── KPI strip ── */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid var(--line);
    }

    .kpi {
      padding: 22px 22px 20px;
      cursor: pointer;
      position: relative;
      border-right: 1px solid var(--line);
      transition: background 0.18s;
    }
    .kpi:last-child { border-right: none; }
    .kpi:hover { background: var(--hover); }

    .kpi.active {
      background: var(--cream);
    }
    .kpi.active::after {
      content: '';
      position: absolute;
      left: 22px; right: 22px; bottom: 0;
      height: 3px;
      background: var(--ink);
      border-radius: 3px 3px 0 0;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .kpi-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .kpi-full {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--ink-faint);
    }

    /* ── Chart card ── */
    .chart-card {
      background: var(--white);
      border-radius: 20px;
      padding: 24px 28px 20px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--line);
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease both;
    }

    .chart-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .chart-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .chart-title-metric { color: var(--bark); font-style: italic; }

    .chart-summary {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.03em;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* ── Section grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 24px 26px 22px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--line);
      animation: fadeUp 0.5s ease both;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 18px;
    }

    /* Section heading */
    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin: 28px 0 14px;
      padding-left: 4px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
      margin-left: 10px;
    }

    /* ── Bar lists ── */
    .bar-list { display: flex; flex-direction: column; gap: 12px; }

    .bar-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      align-items: center;
    }
    .bar-row .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .bar-row .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .bar-track {
      grid-column: 1 / -1;
      height: 6px;
      background: var(--cream);
      border-radius: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--ink);
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .bar-fill.terracotta { background: var(--terracotta); }
    .bar-fill.blush      { background: var(--blush); }

    /* ── Donut (gender) ── */
    .donut-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }
    .donut-wrap {
      width: 130px; height: 130px;
      flex-shrink: 0;
      position: relative;
    }
    .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .donut-legend .legend-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .legend-item .swatch {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 3px;
      margin-right: 8px;
      vertical-align: middle;
    }
    .legend-item .legend-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 500;
    }

    /* ── Hour bars (Active times) ── */
    .hour-chart {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 3px;
      align-items: end;
      height: 110px;
      margin-top: 6px;
    }
    .hour-bar {
      background: var(--blush);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: background 0.2s;
      position: relative;
      cursor: pointer;
    }
    .hour-bar:hover {
      background: var(--bark);
    }
    .hour-bar.peak { background: var(--ink); }

    .hour-bar:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--white);
      padding: 5px 9px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }

    .hour-axis {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 3px;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--ink-faint);
      text-align: center;
    }
    .hour-axis span:not(:nth-child(6n+1)) { visibility: hidden; }

    .peak-line {
      font-size: 12px;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .peak-line strong {
      color: var(--ink);
      font-weight: 600;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-soft);
    }
    .loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 2px solid var(--cream-mid);
      border-top-color: var(--bark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }

    /* Error state */
    .error-card {
      background: #fdf3f3;
      border: 1px solid #e7c4c4;
      color: #8b3535;
      padding: 18px 22px;
      border-radius: 14px;
      font-size: 13px;
    }
    .error-card strong { display: block; margin-bottom: 4px; }
    .error-card code {
      background: #f7e5e5;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(45,138,80,0.4); }
      50%      { box-shadow: 0 0 0 4px rgba(45,138,80,0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 880px) {
      .kpi-strip { grid-template-columns: repeat(2, 1fr); }
      .kpi { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
      .kpi:nth-child(2n) { border-right: none; }
      .kpi:nth-last-child(-n+1) { border-bottom: none; }
      .grid, .grid-3 { grid-template-columns: 1fr; }
      .header h1 { font-size: 30px; }
      .chart-wrap { height: 240px; }
    }
    @media (max-width: 540px) {
      .page { padding: 24px 14px 48px; }
      .kpi-strip { grid-template-columns: 1fr; }
      .kpi { border-right: none; border-bottom: 1px solid var(--line); }
      .kpi:last-child { border-bottom: none; }
      .kpi-value { font-size: 28px; }
      .header { gap: 14px; }
      .header-photo { width: 56px; height: 56px; }
      .header h1 { font-size: 26px; }
      .chart-card, .card { padding: 20px 18px; }
      .donut-row { flex-direction: column; gap: 14px; }
      .donut-wrap { width: 110px; height: 110px; }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="topbar">
      <a class="back-link" href="/">Back to Links</a>
      <div class="last-updated" id="last-updated"><span class="dot"></span>Loading…</div>
    </div>

    <header class="header">
      <img class="header-photo" src="../profile.jpg" alt="Lydia Hansen" onerror="this.style.display='none'" />
      <div>
        <h1>Creator Analytics</h1>
        <div class="handle">Lydia Hansen · @lydiaclarkhansen</div>
      </div>
    </header>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading analytics…</div>
      </div>
    </div>

  </main>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    //  Constants
    // ─────────────────────────────────────────────────────────────────────────
    const RANGES = [
      { key: 7,   label: '7 days'   },
      { key: 28,  label: '28 days'  },
      { key: 60,  label: '60 days'  },
      { key: 90,  label: '90 days'  },
      { key: 120, label: '120 days' },
      { key: 365, label: '365 days' },
    ];

    const METRICS = [
      { key: 'videoViews',   label: 'Video views',   accessor: r => r.videoViews   },
      { key: 'profileViews', label: 'Profile views', accessor: r => r.profileViews },
      { key: 'likes',        label: 'Likes',         accessor: r => r.likes        },
      { key: 'comments',     label: 'Comments',      accessor: r => r.comments     },
      { key: 'shares',       label: 'Shares',        accessor: r => r.shares       },
    ];

    const COLORS = {
      ink:       '#1f1f1f',
      bark:      '#b07a5e',
      terracotta:'#d7a98f',
      blush:     '#e8c4b0',
      cream:     '#f1ddd2',
      positive:  '#2d8a50',
      negative:  '#c14545',
    };

    const PALETTE = [COLORS.ink, COLORS.bark, COLORS.terracotta, COLORS.blush, COLORS.cream];

    // App state
    let DATA = null;
    let chart = null;
    let currentRange = 7;
    let currentMetric = 'videoViews';

    // ─────────────────────────────────────────────────────────────────────────
    //  Number formatters
    // ─────────────────────────────────────────────────────────────────────────
    const fmtCompact = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const abs = Math.abs(n);
      if (abs >= 1e6) return (n / 1e6).toFixed(abs >= 1e7 ? 0 : 1).replace(/\.0$/, '') + 'M';
      if (abs >= 1e3) return (n / 1e3).toFixed(abs >= 1e4 ? 0 : 1).replace(/\.0$/, '') + 'K';
      return n.toLocaleString();
    };

    const fmtFull = (n) => (n === null || n === undefined || isNaN(n)) ? '—' : n.toLocaleString();

    const fmtDate = (iso) => {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };
    const fmtDateLong = (iso) => {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    };

    const timeAgo = (iso) => {
      const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
      if (mins < 2)    return 'Updated just now';
      if (mins < 60)   return `Updated ${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)    return `Updated ${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `Updated ${days}d ago`;
    };

    // ─────────────────────────────────────────────────────────────────────────
    //  Data slicing
    // ─────────────────────────────────────────────────────────────────────────
    function sliceLast(arr, days) {
      return arr.slice(-days);
    }

    function sumWindow(rows, accessor) {
      return rows.reduce((acc, r) => acc + (accessor(r) || 0), 0);
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  Renderers
    // ─────────────────────────────────────────────────────────────────────────
    function renderRangeSelector() {
      return `
        <div class="range-selector" role="tablist" aria-label="Date range">
          ${RANGES.map(r => `
            <button class="range-btn ${r.key === currentRange ? 'active' : ''}"
                    data-range="${r.key}" role="tab"
                    aria-selected="${r.key === currentRange}">
              Last ${r.label}
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderKpiStrip() {
      return `
        <div class="kpi-strip">
          ${METRICS.map(m => {
            const current = sumWindow(sliceLast(DATA.overview, currentRange), m.accessor);
            const isActive = m.key === currentMetric;
            return `
              <div class="kpi ${isActive ? 'active' : ''}" data-metric="${m.key}" tabindex="0" role="button" aria-pressed="${isActive}">
                <div class="kpi-label">${m.label}</div>
                <div class="kpi-value">${fmtCompact(current)}</div>
                <div class="kpi-full" title="${fmtFull(current)}">${fmtFull(current)}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderChartCard() {
      const metric = METRICS.find(m => m.key === currentMetric);
      const rangeLabel = RANGES.find(r => r.key === currentRange).label;
      return `
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">
              <span class="chart-title-metric">${metric.label}</span>
              <span style="color:var(--ink-faint);font-weight:400;font-style:normal">· last ${rangeLabel}</span>
            </div>
            <div class="chart-summary" id="chart-summary"></div>
          </div>
          <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
        </div>
      `;
    }

    function renderTrafficSource() {
      const items = DATA.trafficSource;
      const max = Math.max(...items.map(x => x.value));
      return `
        <div class="card">
          <div class="card-title">Traffic source</div>
          <div class="card-subtitle">Where viewers discover content</div>
          <div class="bar-list">
            ${items.map((x, i) => `
              <div class="bar-row">
                <div class="label">${x.label}</div>
                <div class="value">${x.value.toFixed(1)}%</div>
                <div class="bar-track">
                  <div class="bar-fill ${i === 0 ? '' : i === 1 ? 'terracotta' : 'blush'}"
                       style="width: ${(x.value / max) * 100}%"></div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderActiveHours() {
      const data = DATA.followerActivity;
      if (!data || data.length === 0) return '';
      const max = Math.max(...data.map(d => d.active));
      const peakHour = data.reduce((a, b) => a.active > b.active ? a : b);
      const fmt12 = (h) => {
        const ampm = h >= 12 ? 'pm' : 'am';
        const h12 = h % 12 === 0 ? 12 : h % 12;
        return `${h12}${ampm}`;
      };
      return `
        <div class="card">
          <div class="card-title">Most active times</div>
          <div class="card-subtitle">Average active followers by hour</div>
          <div class="peak-line">Peak activity at <strong>${fmt12(peakHour.hour)}</strong> with <strong>${fmtCompact(peakHour.active)}</strong> active followers</div>
          <div class="hour-chart">
            ${data.map(d => `
              <div class="hour-bar ${d.hour === peakHour.hour ? 'peak' : ''}"
                   style="height: ${(d.active / max) * 100}%"
                   data-tooltip="${fmt12(d.hour)} · ${fmtFull(d.active)}"></div>
            `).join('')}
          </div>
          <div class="hour-axis">
            ${data.map(d => `<span>${fmt12(d.hour)}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function renderBarList(items, fillClass = '') {
      const max = Math.max(...items.map(x => x.value));
      return `
        <div class="bar-list">
          ${items.map(x => `
            <div class="bar-row">
              <div class="label">${x.label}</div>
              <div class="value">${x.value.toFixed(1)}%</div>
              <div class="bar-track">
                <div class="bar-fill ${fillClass}" style="width: ${(x.value / max) * 100}%"></div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderDonut(items, palette) {
      // SVG donut chart. We compute cumulative arc lengths.
      const total = items.reduce((a, b) => a + b.value, 0);
      const r = 50, c = 2 * Math.PI * r;
      let offset = 0;
      const slices = items.map((x, i) => {
        const dash = (x.value / total) * c;
        const seg = `<circle r="${r}" cx="60" cy="60" fill="transparent"
                     stroke="${palette[i % palette.length]}" stroke-width="18"
                     stroke-dasharray="${dash} ${c - dash}"
                     stroke-dashoffset="${-offset}"
                     transform="rotate(-90 60 60)"></circle>`;
        offset += dash;
        return seg;
      }).join('');
      return `
        <div class="donut-row">
          <div class="donut-wrap">
            <svg viewBox="0 0 120 120" width="100%" height="100%">
              <circle r="${r}" cx="60" cy="60" fill="transparent" stroke="var(--cream)" stroke-width="18"></circle>
              ${slices}
            </svg>
          </div>
          <div class="donut-legend">
            ${items.map((x, i) => `
              <div class="legend-item">
                <span><span class="swatch" style="background:${palette[i % palette.length]}"></span>${x.label}</span>
                <span class="legend-value">${x.value.toFixed(1)}%</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderViewersSection() {
      return `
        <div class="section-heading">Viewers <span style="font-size:13px;color:var(--ink-faint);font-family:'DM Sans';font-style:italic;font-weight:400;letter-spacing:0">last 7 days</span></div>
        <div class="grid-3">
          <div class="card">
            <div class="card-title">Gender</div>
            <div class="card-subtitle">Viewer demographic</div>
            ${renderDonut(DATA.viewerGender, [COLORS.bark, COLORS.terracotta, COLORS.blush])}
          </div>
          <div class="card">
            <div class="card-title">Age</div>
            <div class="card-subtitle">Viewer demographic</div>
            ${renderBarList(DATA.viewerAge, 'terracotta')}
          </div>
          <div class="card">
            <div class="card-title">Location</div>
            <div class="card-subtitle">Top countries</div>
            ${renderBarList(DATA.viewerLocations, 'blush')}
          </div>
        </div>
      `;
    }

    function renderFollowersSection() {
      const latest = DATA.followerHistory[DATA.followerHistory.length - 1];
      const prior  = DATA.followerHistory[Math.max(0, DATA.followerHistory.length - 8)];
      const weekDelta = latest.followers - prior.followers;
      return `
        <div class="section-heading">Followers <span style="font-size:13px;color:var(--ink-faint);font-family:'DM Sans';font-style:italic;font-weight:400;letter-spacing:0">all time</span></div>
        <div class="grid-3">
          <div class="card">
            <div class="card-title" style="font-size:36px;line-height:1;margin-bottom:6px;">${fmtCompact(latest.followers)}</div>
            <div class="card-subtitle">Total followers</div>
            <div style="margin-top:14px;font-size:13px;color:var(--ink-soft)">
              <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);font-weight:500;">${weekDelta >= 0 ? '+' : ''}${fmtFull(weekDelta)}</span>
              <span style="margin-left:6px">in the last 7 days</span>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Gender</div>
            <div class="card-subtitle">Follower demographic</div>
            ${renderDonut(DATA.followerGender, [COLORS.bark, COLORS.terracotta, COLORS.blush])}
          </div>
          <div class="card">
            <div class="card-title">Age</div>
            <div class="card-subtitle">Follower demographic</div>
            ${renderBarList(DATA.followerAge, 'terracotta')}
          </div>
        </div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card-title">Top territories</div>
          <div class="card-subtitle">Where followers are based</div>
          <div class="bar-list bar-list-dense">
            ${(() => {
              const max = Math.max(...DATA.followerTerritories.map(x => x.value));
              return DATA.followerTerritories.map(x => `
                <div class="bar-row">
                  <div class="label">${x.label}</div>
                  <div class="value">${x.value.toFixed(1)}%</div>
                  <div class="bar-track">
                    <div class="bar-fill" style="width: ${(x.value / max) * 100}%"></div>
                  </div>
                </div>
              `).join('');
            })()}
          </div>
        </div>
        ${renderActiveHours()}
      `;
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  Chart.js
    // ─────────────────────────────────────────────────────────────────────────
    function buildChart() {
      const canvas = document.getElementById('main-chart');
      if (!canvas) return;
      // Graceful fallback if Chart.js failed to load (CDN blocked, offline, etc.)
      if (typeof Chart === 'undefined') {
        const wrap = canvas.parentElement;
        if (wrap) {
          wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink-faint);font-size:13px;text-align:center;padding:0 20px;">Chart library unavailable — check your internet connection or replace the Chart.js CDN URL.</div>`;
        }
        return;
      }
      const ctx = canvas.getContext('2d');

      const metric = METRICS.find(m => m.key === currentMetric);
      const rows = sliceLast(DATA.overview, currentRange);
      const labels = rows.map(r => r.date);
      const values = rows.map(metric.accessor);

      // Gradient fill
      const gradient = ctx.createLinearGradient(0, 0, 0, 280);
      gradient.addColorStop(0, 'rgba(176,122,94,0.28)');
      gradient.addColorStop(1, 'rgba(176,122,94,0)');

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: metric.label,
            data: values,
            borderColor: COLORS.bark,
            backgroundColor: gradient,
            borderWidth: 2,
            fill: true,
            tension: 0.32,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBorderWidth: 2,
            pointHoverBorderColor: COLORS.bark,
            pointHoverBackgroundColor: '#ffffff',
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          animation: { duration: 600, easing: 'easeOutCubic' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: COLORS.ink,
              titleColor: '#ffffff',
              bodyColor: '#ffffff',
              titleFont: { family: 'DM Sans', size: 12, weight: '500' },
              bodyFont:  { family: 'JetBrains Mono', size: 13, weight: '500' },
              padding: 10,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                title: (items) => fmtDateLong(items[0].label),
                label: (item) => `${metric.label}: ${fmtFull(item.parsed.y)}`,
              },
            },
          },
          scales: {
            x: {
              grid: { display: false, drawBorder: false },
              ticks: {
                color: '#8a7568',
                font: { family: 'JetBrains Mono', size: 10 },
                maxRotation: 0,
                autoSkipPadding: 18,
                callback: function (val, idx) {
                  // Use existing tick label (label is ISO date)
                  const iso = this.getLabelForValue(val);
                  return fmtDate(iso);
                },
              },
            },
            y: {
              beginAtZero: true,
              grid: { color: '#ece1d6', drawBorder: false },
              ticks: {
                color: '#8a7568',
                font: { family: 'JetBrains Mono', size: 10 },
                callback: (v) => fmtCompact(v),
                maxTicksLimit: 5,
              },
            },
          },
        },
      });

      // Update chart summary
      const total = values.reduce((a, b) => a + b, 0);
      const avg = Math.round(total / values.length);
      const max = Math.max(...values);
      const summary = document.getElementById('chart-summary');
      if (summary) {
        summary.textContent = `total ${fmtCompact(total)}  ·  avg ${fmtCompact(avg)}  ·  peak ${fmtCompact(max)}`;
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  Render shell + bind events
    // ─────────────────────────────────────────────────────────────────────────
    function render() {
      const root = document.getElementById('content');
      root.innerHTML = `
        ${renderRangeSelector()}
        ${renderKpiStrip()}
        ${renderChartCard()}
        ${renderTrafficSource()}
        ${renderViewersSection()}
        ${renderFollowersSection()}
      `;

      // Range buttons
      root.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentRange = parseInt(btn.dataset.range, 10);
          render();
        });
      });

      // KPI tabs
      root.querySelectorAll('.kpi').forEach(kpi => {
        const trigger = () => {
          currentMetric = kpi.dataset.metric;
          render();
        };
        kpi.addEventListener('click', trigger);
        kpi.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); }
        });
      });

      // Build chart
      buildChart();
    }

    function showError(msg, details) {
      document.getElementById('content').innerHTML = `
        <div class="error-card">
          <strong>${msg}</strong>
          ${details || ''}
        </div>
      `;
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  Boot
    // ─────────────────────────────────────────────────────────────────────────
    async function boot() {
      let DATA_LOADED = false;
      try {
        const res = await fetch('data.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        DATA = await res.json();
        DATA_LOADED = true;
      } catch (err) {
        console.error(err);
        showError('Could not load analytics data',
          `Make sure <code>stats/data.json</code> exists. Run <code>python convert.py</code> from the project root to regenerate it. <br><br>Details: ${err.message}`);
        return;
      }

      const updEl = document.getElementById('last-updated');
      if (DATA.generatedAt) {
        updEl.innerHTML = `<span class="dot"></span>${timeAgo(DATA.generatedAt)}`;
      } else {
        updEl.innerHTML = `<span class="dot"></span>Live`;
      }

      try {
        render();
      } catch (err) {
        console.error('Render error:', err);
        showError('Something went wrong rendering the dashboard',
          `Details: ${err.message}`);
        return;
      }

      // Re-render on resize so the chart redraws cleanly
      let resizeT;
      window.addEventListener('resize', () => {
        clearTimeout(resizeT);
        resizeT = setTimeout(() => chart && chart.resize(), 200);
      });
    }

    boot();
  </script>
</body>
</html>
