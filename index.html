<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydia Hansen</title>

    <meta property="og:title" content="Lydia Hansen | All My Favorite Things">
    <meta property="og:description" content="All my favorite things — style, wellness, and intentional living.">
    <meta property="og:image" content="https://lydiaclarkhansen.com/profile.jpg">
    <meta property="og:url" content="https://lydiaclarkhansen.com">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LP9L9WTTMS"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-LP9L9WTTMS');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #FAF5EF;
            --stone: #D6CDC6;
            --sage: #8DA399;
            --ink: #1E1E1E;
            --muted: #888;
            --white: #FFFFFF;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        .font-editorial {
            font-family: 'Cormorant Garamond', serif;
        }

        /* ── Divider ── */
        .divider {
            width: 40px;
            height: 1px;
            background: var(--stone);
            margin: 0 auto;
        }

        /* ── Hero ── */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 72px 24px 56px;
            text-align: center;
            max-width: 560px;
            margin: 0 auto;
        }

        .avatar-ring {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, var(--stone), var(--sage));
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--cream);
        }

        .hero-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 300;
            letter-spacing: 0.08em;
            line-height: 1;
            margin-bottom: 10px;
            color: var(--ink);
        }

        .hero-tagline {
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* ── Social icons ── */
        .socials {
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 0;
        }

        .social-link {
            color: var(--ink);
            font-size: 1.1rem;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
        }

        .social-link:hover {
            color: var(--sage);
            transform: translateY(-1px);
        }

        /* Email popover */
        .email-wrap { position: relative; }

        .email-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink);
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s, transform 0.2s;
        }

        .email-btn:hover, .email-btn.open {
            color: var(--sage);
            transform: translateY(-1px);
        }

        .email-popover {
            position: absolute;
            top: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            background: var(--white);
            border: 1px solid var(--stone);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.09);
            overflow: hidden;
            z-index: 100;
            animation: fadeUp 0.15s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(6px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .email-popover a,
        .email-popover button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--ink);
            text-decoration: none;
            background: none;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'Inter', sans-serif;
            border-bottom: 1px solid #F3EFEB;
        }

        .email-popover a:last-child,
        .email-popover button:last-child { border-bottom: none; }

        .email-popover a:hover,
        .email-popover button:hover { background: var(--cream); }

        /* ── Section label ── */
        .section-label {
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
            text-align: center;
            display: block;
            margin-bottom: 32px;
        }

        /* ── Link cards ── */
        .links-section {
            max-width: 520px;
            margin: 0 auto;
            padding: 64px 24px 0;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            background: var(--white);
            border: 1px solid var(--stone);
            border-radius: 100px;
            text-decoration: none;
            color: var(--ink);
            transition: box-shadow 0.2s, transform 0.2s;
            margin-bottom: 12px;
        }

        .link-card:hover {
            box-shadow: 0 6px 24px rgba(141,163,153,0.18);
            transform: translateY(-2px);
        }

        .link-card-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .link-thumb {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--cream);
            border: 1px solid #F0EAE3;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-thumb img {
            width: 100%;
            height: 100%;
        }

        .link-thumb img.contain {
            object-fit: contain;
            padding: 6px;
            mix-blend-mode: multiply;
        }

        .link-thumb img.cover { object-fit: cover; }

        .link-meta { display: flex; flex-direction: column; gap: 2px; text-align: left; }

        .link-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sage);
            font-weight: 700;
        }

        .link-title {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--ink);
        }

        .link-arrow {
            color: var(--stone);
            font-size: 0.85rem;
            transition: color 0.2s, transform 0.2s;
            margin-right: 4px;
        }

        .link-card:hover .link-arrow {
            color: var(--sage);
            transform: translateX(3px);
        }

        /* ── Press ── */
        .press-section {
            max-width: 520px;
            margin: 0 auto;
            padding: 72px 24px 0;
        }

        .press-card {
            display: block;
            text-decoration: none;
            background: var(--white);
            border: 1px solid var(--stone);
            border-radius: 28px;
            padding: 40px 36px;
            text-align: center;
            transition: box-shadow 0.25s, transform 0.25s;
            position: relative;
            overflow: hidden;
        }

        .press-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(141,163,153,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .press-card:hover {
            box-shadow: 0 12px 48px rgba(141,163,153,0.15);
            transform: translateY(-3px);
        }

        .press-outlet {
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--sage);
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .press-quote {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55rem;
            font-weight: 400;
            font-style: italic;
            color: var(--ink);
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .press-cta {
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .press-card:hover .press-cta { color: var(--sage); }

        /* ── Footer ── */
        footer {
            margin-top: 80px;
            padding: 40px 24px;
            text-align: center;
            border-top: 1px solid var(--stone);
        }

        .footer-text {
            font-size: 0.58rem;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div id="app">

        <!-- Hero -->
        <div class="hero">
            <div class="avatar-ring">
                <img src="profile1.jpg" alt="Lydia Hansen" onerror="this.src='https://ui-avatars.com/api/?name=Lydia+Hansen&background=D6CDC6&color=fff'">
            </div>

            <h1 class="hero-name">Lydia Hansen</h1>
            <p class="hero-tagline">All My Favorite Things</p>

            <div class="socials">
                <a href="https://www.tiktok.com/@lydiaclarkhansen" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
                <a href="https://www.instagram.com/lydiaclarkhansen" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://www.youtube.com/@LydiaClarkHansen" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>

                <div class="email-wrap" id="emailWrap">
                    <button class="email-btn" id="emailBtn" aria-label="Email" aria-expanded="false">
                        <i class="fa-solid fa-envelope"></i>
                    </button>
                    <div class="email-popover" id="emailPopover" hidden>
                        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=lydia@idolsandicons.co" target="_blank">
                            <i class="fa-brands fa-google" style="color:#EA4335"></i> Gmail
                        </a>
                        <a href="mailto:lydia@idolsandicons.co">
                            <i class="fa-solid fa-paper-plane" style="color:#4A90D9"></i> Default Mail App
                        </a>
                        <button id="copyEmailBtn">
                            <i class="fa-solid fa-copy" style="color:#aaa" id="copyIcon"></i>
                            <span id="copyLabel">Copy Email</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Links -->
        <section class="links-section">
            <span class="section-label">Curated For You</span>

            <a href="https://portal.tryshed.com/alp?partner=leaddyno&utm_medium=affiliate&infAmt=%2450&medPromo=&afmc=LydiaBF30&utm_campaign=LydiaBF30&utm_source=leaddyno&utm_medium=affiliate&utm_content=4n3"
               class="link-card"
               target="_blank"
               rel="noopener noreferrer"
               onclick="gtag('event','click_affiliate_link',{link_name:'Shed_Offer',link_url:this.href})">
                <div class="link-card-left">
                    <div class="link-thumb">
                        <img src="shed.jpg" alt="Shed" class="cover" onerror="this.style.display='none'">
                    </div>
                    <div class="link-meta">
                        <span class="link-label">Special Offer</span>
                        <span class="link-title">$100 OFF WEIGHT LOSS</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right link-arrow"></i>
            </a>

            <a href="https://shopmy.us/shop/lydiaclarkhansen?Section_id=1971346&tab=collections"
               class="link-card"
               target="_blank"
               rel="noopener noreferrer"
               onclick="gtag('event','click_affiliate_link',{link_name:'Shop_My',link_url:this.href})">
                <div class="link-card-left">
                    <div class="link-thumb">
                        <img src="Shopmy.jpg" alt="Shop My" class="contain" onerror="this.style.display='none'">
                    </div>
                    <div class="link-meta">
                        <span class="link-label">Links</span>
                        <span class="link-title">SHOP MY</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right link-arrow"></i>
            </a>
        </section>

        <!-- Press -->
        <section class="press-section">
            <span class="section-label">In the Press</span>

            <a href="https://www.newsweek.com/shock-woman-minimalist-apartment-decluttering-11285640"
               class="press-card"
               target="_blank"
               rel="noopener noreferrer">
                <div class="press-outlet">
                    <i class="fa-solid fa-newspaper" style="font-size:0.55rem"></i> Newsweek
                </div>
                <p class="press-quote">"Shocking Minimalist Apartment..."</p>
                <span class="press-cta">Read the Feature <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.55rem"></i></span>
            </a>
        </section>

        <!-- Footer -->
        <footer>
            <p class="footer-text">&copy; 2026 Lydia Hansen</p>
        </footer>

    </div>

    <script>
        // Email popover
        const emailBtn = document.getElementById('emailBtn');
        const emailPopover = document.getElementById('emailPopover');
        const copyEmailBtn = document.getElementById('copyEmailBtn');
        const copyIcon = document.getElementById('copyIcon');
        const copyLabel = document.getElementById('copyLabel');

        emailBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = !emailPopover.hidden;
            emailPopover.hidden = isOpen;
            emailBtn.classList.toggle('open', !isOpen);
            emailBtn.setAttribute('aria-expanded', String(!isOpen));
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('emailWrap').contains(e.target)) {
                emailPopover.hidden = true;
                emailBtn.classList.remove('open');
                emailBtn.setAttribute('aria-expanded', 'false');
            }
        });

        copyEmailBtn.addEventListener('click', () => {
            navigator.clipboard.writeText('lydia@idolsandicons.co').then(() => {
                copyIcon.className = 'fa-solid fa-check';
                copyIcon.style.color = '#4CAF50';
                copyLabel.textContent = 'Copied!';
                setTimeout(() => {
                    copyIcon.className = 'fa-solid fa-copy';
                    copyIcon.style.color = '#aaa';
                    copyLabel.textContent = 'Copy Email';
                    emailPopover.hidden = true;
                    emailBtn.classList.remove('open');
                }, 2000);
            });
        });
    </script>

</body>
</html>
